# Managed by the HY-chat ECS deployment.
server {
  set $forward_scheme http;
  set $server "hy-chat-frontend";
  set $port 3000;

  listen 80;
  listen [::]:80;
  server_name chat.hy-ai.xyz;

  access_log /data/logs/hy-chat-frontend_access.log proxy;
  error_log /data/logs/hy-chat-frontend_error.log warn;

  include conf.d/include/block-exploits.conf;
  include conf.d/include/letsencrypt-acme-challenge.conf;

  location /backend/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_pass http://hy-chat-api:8000/;
  }

  location / {
    include conf.d/include/proxy.conf;
  }

  include /data/nginx/custom/server_proxy[.]conf;
}
