# Managed by the HY-chat ECS deployment.
server {
  set $forward_scheme http;
  set $server "hy-chat-api";
  set $port 8000;

  listen 80;
  listen [::]:80;
  server_name api.chat.hy-ai.xyz;

  access_log /data/logs/hy-chat-api_access.log proxy;
  error_log /data/logs/hy-chat-api_error.log warn;

  include conf.d/include/block-exploits.conf;
  include conf.d/include/letsencrypt-acme-challenge.conf;

  location / {
    include conf.d/include/proxy.conf;
  }

  include /data/nginx/custom/server_proxy[.]conf;
}

server {
  set $forward_scheme http;
  set $server "hy-chat-api";
  set $port 8000;

  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.chat.hy-ai.xyz;

  ssl_certificate /etc/letsencrypt/live/hy-ai-chat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hy-ai-chat/privkey.pem;
  include conf.d/include/ssl-ciphers.conf;

  access_log /data/logs/hy-chat-api_access.log proxy;
  error_log /data/logs/hy-chat-api_error.log warn;

  include conf.d/include/block-exploits.conf;
  include conf.d/include/letsencrypt-acme-challenge.conf;

  location / {
    include conf.d/include/proxy.conf;
  }

  include /data/nginx/custom/server_proxy[.]conf;
}
